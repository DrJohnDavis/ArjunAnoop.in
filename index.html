<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Arjun Anoop Designs" />
<meta property="og:description" content="Portfolio of Arjun Anoop: Architecture, Art, and Design." />
<meta property="og:url" content="https://arjunanoop.in/" />
<meta property="og:type" content="website" />

<meta property="og:image" content="https://arjunanoop.in/anoop-logo.jpg" />
<meta property="og:image:type" content="image/jpeg" />
<link rel="icon" type="image/x-icon" href="https://arjunanoop.in/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="https://arjunanoop.in/apple-touch-icon.png"> 
<link rel="manifest"  href="https://arjunanoop.in/site.webmanifest"> 
    
    <title>Arjun Anoop Designs</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet">

    <style>
        /* CSS Reset for consistent spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f4f4; /* Light textured-looking gray/white */
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* Container for the logo */
        .logo-container {
            position: absolute;
            top: 50px;
            left: 50px;
        }

        /* SVG Logo Styling */
        .logo {
            width: 90px;
            height: 90px;
            display: block;
            border-radius: 4px; /* Slight rounding on the black box */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Main Navigation Styling */
        .main-nav {
            /* Pushes the navigation to the right side and centers vertically */
            margin-left: auto;
            margin-right: 20%; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .main-nav ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 30px; /* Spacing between links */
        }

        .main-nav li {
            text-align: left;
        }

        .main-nav a {
            text-decoration: none;
            color: #2b2b2b;
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 3px; /* Creates the wide, elegant text look */
            transition: color 0.3s ease, padding-left 0.3s ease;
        }

        /* Hover effect for the links */
        .main-nav a:hover {
            color: #888;
            padding-left: 10px;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .logo-container {
                top: 30px;
                left: 30px;
            }
            .logo {
                width: 60px;
                height: 60px;
            }
            .main-nav {
                margin-right: auto;
                margin-left: 30px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <header class="logo-container">
        <img width="48" height="48" src="anoop-logo.jpg" /> <br />
        
    </header>

    <nav class="main-nav">
        <ul>
            <li><a href="#about">ABOUT</a></li>
            <li><a href="#architecture">ARCHITECTURE</a></li>
            <li><a href="#art">ART</a></li>
            <li><a href="#aperture">APERTURE</a></li>
            <li><a href="#approach">APPROACH</a></li>
            <li><a href="https://www.linkedin.com/in/arjun-anoop-74542b1a2"> <img width="30" height="30" src="https://img.icons8.com/color/48/linkedin.png" alt="linkedin"/> LinkedIn Profile</a></li>
        </ul>
    </nav>

</body>
</html>
